    <base href="/JLPT_words_learner/">

    <script>
      // Force the app to treat the current folder as the "Home" base
      (function() {
        const repoPath = "/JLPT_words_learner/";
        if (window.location.pathname.includes('JLPT_words_learner')) {
            window.history.replaceState(null, '', window.location.pathname);
        }
        
        // Fix the database fetching
        const _fetch = window.fetch;
        window.fetch = function() {
          if (typeof arguments[0] === 'string' && arguments[0].startsWith('/')) {
              arguments[0] = arguments[0].replace(/^\//, '');
          }
          return _fetch.apply(this, arguments);
        };
      })();
    </script>
