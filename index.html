<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>JLPT Vocabulary Learner</title>
    
    <script>
      // 1. PATH FIX: Tell the app where it lives
      const repoName = '/JLPT_words_learner/';
      
      // Force the browser to treat the subfolder as the root
      if (window.location.pathname === repoName.slice(0, -1) || window.location.pathname === '/') {
        window.history.replaceState(null, '', repoName);
      }

      // 2. FETCH FIX: Redirect broken JSON requests
      const _originalFetch = window.fetch;
      window.fetch = function() {
        let url = arguments[0];
        if (typeof url === 'string') {
            // If the app asks for /vocabulary.json, give it ./vocabulary.json
            if (url.endsWith('vocabulary.json') || url.endsWith('vocab-database.json')) {
                arguments[0] = url.split('/').pop();
            }
        }
        return _originalFetch.apply(this, arguments);
      };
    </script>

</head>

</body>
</html>
