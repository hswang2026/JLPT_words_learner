<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>JLPT Vocabulary Learner</title>
    
    <script>
      // 1. Intercept broken "fetch" calls
      const _fetch = window.fetch;
      window.fetch = function() {
        let arg = arguments[0];
        if (typeof arg === 'string' && arg.startsWith('/')) {
            // If the app asks for /vocabulary.json, give it ./vocabulary.json
            if (arg.includes('.json')) {
                arguments[0] = arg.split('/').pop();
            }
        }
        return _fetch.apply(this, arguments);
      };

      // 2. Fix the "Go Home" / 404 Routing error
      // This forces the React Router to stay inside your subfolder
      window.history.pushState = (f => function pushState() {
        if (arguments[2] === '/') arguments[2] = window.location.pathname;
        return f.apply(this, arguments);
      })(window.history.pushState);
    </script>

</head>

</body>
</html>
