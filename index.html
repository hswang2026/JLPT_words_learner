<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>JLPT Vocabulary Learner</title>
    
    <base href="/JLPT_words_learner/">

    <script>
      // FIX 1: Initial 404 & Go Home Fix
      // This catches the app before it loads and tells it the Home path is NOT '/'
      if (window.location.pathname === '/JLPT_words_learner' || window.location.pathname === '/JLPT_words_learner/') {
          // This ensures the internal React router recognizes this folder as the start
          window.history.replaceState(null, '', '/JLPT_words_learner/');
      }

      // FIX 2: Database Loading Fix
      // Intercepts the hardcoded "/vocabulary.json" calls and makes them relative
      const _orgFetch = window.fetch;
      window.fetch = function() {
        let url = arguments[0];
        if (typeof url === 'string' && url.startsWith('/')) {
            // Remove the leading slash so it looks inside the current folder
            if (url.includes('.json')) {
                arguments[0] = url.split('/').pop();
            }
        }
        return _orgFetch.apply(this, arguments);
      };
    </script>

    <link rel="manifest" href="manifest.json" />
    <script type="module" crossorigin src="index-ByyZV54e.js"></script>
    <link rel="stylesheet" crossorigin href="index-B6ykaXxV.css">
</head>
<body>
    <div id="root"></div>
</body>
</html>
